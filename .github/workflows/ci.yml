name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\secret-scan.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
