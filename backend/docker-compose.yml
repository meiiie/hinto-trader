# Hinto - Docker Compose
version: '3.8'

services:
  backend:
    build: .
    container_name: hinto-trader
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./data:/app/data          # SQLite database persistence
      - ./logs:/app/logs          # Logs persistence
      - ./.env:/app/.env:ro       # Environment variables (read-only)
    env_file:
      - ./.env
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - ENV=${ENV:-live}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
